project:
  name: cmoon
  timezone: UTC

# ── Data source ────────────────────────────────────────────────────────────────
# provider: csv   → reads from paths.raw_data (e.g. data/raw/BTCUSDT_spot.csv)
# provider: ccxt  → fetches live from exchange via ccxt; requires env vars
data_source:
  provider: csv
  exchange: binance
  api_key_env: BINANCE_API_KEY
  secret_env: BINANCE_SECRET

paths:
  raw_data: data/raw
  processed_data: data/processed
  artifacts: artifacts
  notebooks: notebooks
  reports: artifacts/reports
  models: artifacts/models
  predictions: artifacts/predictions

market:
  universe_mode: auto
  symbols: []
  market_type: spot
  bar_interval: 1h
  quote_asset: null
  raw_file_pattern: "*.parquet"
  symbol_source: filename
  timestamp_column: timestamp
  symbol_column: symbol
  min_history_bars: 1000
  max_missing_bar_fraction: 0.05
  require_common_calendar: false

dataset:
  grain: symbol_timestamp
  storage_format: parquet
  index_column: timestamp
  symbol_column: symbol
  feature_prefix: feat_
  target_column: target

splits:
  train_years: 3
  validation_years: 1
  locked_holdout_months: 12
  embargo_days: 5

features:
  price:
    - returns
    - log_returns
  trend:
    - ema
    - macd
  momentum:
    - rsi
    - stochastic
  volatility:
    - atr
    - realized_volatility
    - bollinger_width
  volume:
    - obv
    - vwap_distance
  futures_optional:
    - funding_rate_zscore
    - open_interest_change

labels:
  method: triple_barrier
  take_profit: 0.02
  stop_loss: 0.01
  max_horizon_bars: 24
  # class_weight: balanced prevents RF/XGBoost from ignoring minority classes
  class_weight: balanced
  # Informational: log a warning if any class falls below this ratio
  min_label_ratio: 0.10

cross_validation:
  method: purged_walk_forward
  folds: 5
  embargo_bars: 24

model:
  baseline: rf
  candidates:
    - rf
    - xgb
  random_state: 42
  max_tuning_trials: 50

signals:
  long_threshold: 0.60
  short_threshold: 0.60

risk:
  target_annual_volatility: 0.15
  max_single_position_equity_fraction: 0.20
  max_open_positions: 10
  max_leverage: 1.0
  max_portfolio_leverage: 1.0
  stop_loss_atr_multiple: 1.0
  take_profit_atr_multiple: 2.0
  max_hold_bars: 24
  kill_switch_drawdown: 0.15

backtest:
  initial_equity: 100000
  fill_policy: next_bar_open
  clock: union_of_symbol_bars
  fee_bps: 5
  slippage_bps: 2
  funding_enabled: false

reporting:
  experiment_log: artifacts/experiment_log.csv
  equity_curve_plot: artifacts/reports/equity_curve.png
  tear_sheet: artifacts/reports/tear_sheet.png
